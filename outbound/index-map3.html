<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дэшборд отгрузок — Тепловая карта</title>
    
    <!-- ВАЖНО: PapaParse первым -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.4.1/papaparse.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/leaflet-heat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <style>
        body { margin:0; font-family: system-ui, sans-serif; background: #f8fafc; }
        header { background: linear-gradient(135deg, #1e40af, #3b82f6); color: white; padding: 20px; text-align: center; }
        .container { max-width: 1600px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 25px; }
        #map, #map2, #map3 { height: 520px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .status { padding: 12px; background: #fef3c7; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>
    <header>
        <h1>📦 Тепловая карта отгрузок по России</h1>
        <p id="status">Загрузка данных из 1сsales.csv...</p>
    </header>

    <div class="container">
        <div id="content"></div>
    </div>

    <script>
        async function start() {
            try {
                const res = await fetch('1сsales.csv');
                if (!res.ok) throw new Error('File not found');
                
                const text = await res.text();
                document.getElementById('status').innerHTML = '✅ Данные загружены успешно';
                document.getElementById('status').style.color = 'green';

                parseCSV(text);
            } catch (e) {
                document.getElementById('status').innerHTML = `❌ Не найден файл <b>1сsales.csv</b><br>Убедитесь, что он лежит в той же папке, что и index.html`;
                document.getElementById('status').style.color = 'red';
                console.error(e);
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            let startIdx = lines.findIndex(l => l.includes("Склад;Контрагент;")) + 1 || 15;
            
            Papa.parse(lines.slice(startIdx).join('\n'), {
                header: true,
                delimiter: ";",
                skipEmptyLines: true,
                complete: function(results) {
                    window.salesData = results.data.filter(row => row.Склад);
                    console.log("Загружено записей:", window.salesData.length);
                    renderDashboard();
                }
            });
        }

        function renderDashboard() {
            const html = `
                <div class="card"><h2>🌡️ Тепловая карта отгрузок</h2><div id="map"></div></div>
                <div class="card"><h2>📍 Маркеры по городам</h2><div id="map2"></div></div>
            `;
            document.getElementById('content').innerHTML = html;
            initMaps();
        }

        function initMaps() {
            // Heatmap
            const map = L.map('map').setView([55, 65], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.heatLayer([[55,60,100], [56,65,150], [50,40,80]], {radius: 45, blur: 30}).addTo(map);

            // Второй map
            const map2 = L.map('map2').setView([55, 65], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map2);
        }

        // Запуск
        window.onload = start;
    </script>
</body>
</html>
