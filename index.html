<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASN 08.07.2026 0-05</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Segoe UI,Tahoma,sans-serif;
}

body{
    background:#f3f5f7;
    padding:20px;
}

/* =====================================================
   KPI ПАНЕЛЬ
===================================================== */

.kpi-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.kpi-card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.kpi-title{
    color:#666;
    font-size:13px;
}

.kpi-value{
    margin-top:6px;
    font-size:28px;
    font-weight:700;
}

/* =====================================================
   МАШИНЫ
===================================================== */

#dashboard{
    display:flex;
    flex-direction:column;
    gap:25px;
}

.truck-card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.truck-title{
    font-size:24px;
    font-weight:700;
    margin-bottom:15px;
}

.pallet-row{
    display:flex;
    gap:20px;
    align-items:flex-end;
    flex-wrap:wrap;
}

/* =====================================================
   ПАЛЛЕТЫ
===================================================== */

.pallet{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.pallet-number{
    margin-top:8px;
    font-weight:bold;
}

/* =====================================================
   ASN
===================================================== */

.asn-column{
    display:flex;
    flex-direction:column;
    min-width:140px;
}

.asn-box{
    border:1px solid #555;
    padding:4px 6px;
    min-height:30px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    font-size:14px;
    cursor:pointer;
}

.asn-not-started{
    background:white;
}

.asn-progress{
    background:#fff65a;
}

.asn-complete{
    background:#00d26a;
    color:#000;
}

.priority{
    border:3px solid red !important;
}

.progress-value{
    font-size:11px;
    font-weight:bold;
    margin-left:5px;
}

.legend{
    margin-bottom:20px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.legend-item{
    display:flex;
    align-items:center;
    gap:8px;
}

.legend-box{
    width:20px;
    height:20px;
    border:1px solid #444;
}

.tooltip{
    position:fixed;
    background:black;
    color:white;
    padding:8px;
    border-radius:6px;
    font-size:12px;
    pointer-events:none;
    z-index:99999;
    display:none;
}

</style>
</head>
<body>

<h1 style="margin-bottom:20px;">
    Dashboard приемки ASN
</h1>

<div id="kpiContainer" class="kpi-container"></div>

<div class="legend">
    <div class="legend-item">
        <div class="legend-box" style="background:#00d26a"></div>
        Полностью принято
    </div>

    <div class="legend-item">
        <div class="legend-box" style="background:#fff65a"></div>
        В процессе
    </div>

    <div class="legend-item">
        <div class="legend-box" style="background:white"></div>
        Не начинали
    </div>

    <div class="legend-item">
        <div class="legend-box" style="border:3px solid red"></div>
        Приоритетная ASN
    </div>
</div>

<div id="dashboard"></div>

<div id="tooltip" class="tooltip"></div>

<script>

/* =====================================================
   ЗАГРУЗКА CSV
===================================================== */

async function loadCSV(){

    const response = await fetch("asn.csv");

    const text = await response.text();

    return parseCSV(text);
}

/* =====================================================
   CSV ПАРСЕР
   Без использования Papa Parse
===================================================== */

function parseCSV(text){

    const rows = [];
    const lines = text.split(/\r?\n/);

    let headers = [];

    for(let i=0;i<lines.length;i++){

        const line = lines[i].trim();

        if(!line) continue;

        const values = splitCSV(line);

        if(i===0){

            headers = values;
            continue;
        }

        const row = {};

        headers.forEach((h,index)=>{
            row[h.trim()] = values[index]?.trim() || "";
        });

        rows.push(row);
    }

    return rows;
}

/* =====================================================
   ОБРАБОТКА CSV С КАВЫЧКАМИ
===================================================== */

function splitCSV(line){

    const result = [];

    let current = "";
    let insideQuotes = false;

    for(let i=0;i<line.length;i++){

        const char = line[i];

        if(char === '"'){
            insideQuotes = !insideQuotes;
            continue;
        }

        if(char === ";" && !insideQuotes){

            result.push(current);
            current = "";
            continue;
        }

        if(char === "," && !insideQuotes){

            result.push(current);
            current = "";
            continue;
        }

        current += char;
    }

    result.push(current);

    return result;
}

/* =====================================================
   ГРУППИРОВКА ДАННЫХ
===================================================== */

function buildStructure(rows){

    const trucks = {};

    rows.forEach(row=>{

        const truck =
            row["Машина"] ||
            row["Truck"] ||
            row["Машина №"];

        const pallet =
            row["Паллет №"];

        const asn =
            row["ASNNumber"];

        const nomenclature =
            row["Номенклатура"];

        const qtyASN =
            Number(row["Qty ASN"] || 0);

        const fact =
            Number(row["Факт"] || 0);

        const priority =
            row["Приоритет"];

        if(!trucks[truck]){

            trucks[truck] = {
                pallets:{}
            };
        }

        if(!trucks[truck].pallets[pallet]){

            trucks[truck].pallets[pallet] = {};
        }

        if(!trucks[truck].pallets[pallet][asn]){

            trucks[truck].pallets[pallet][asn] = {

                qtyASN:0,
                fact:0,
                priority:false,
                products:[]
            };
        }

        const obj =
            trucks[truck].pallets[pallet][asn];

        obj.qtyASN += qtyASN;
        obj.fact += fact;

        obj.products.push({
            nomenclature,
            qtyASN,
            fact
        });

        if(priority &&
            priority.toString().trim() !== "" &&
            priority.toString().trim() !== "0"){

            obj.priority = true;
        }

    });

    return trucks;
}

/* =====================================================
   KPI
===================================================== */

function buildKPI(rows){

    let qty=0;
    let fact=0;

    const trucks =
        new Set();

    const asnSet =
        new Set();

    rows.forEach(r=>{

        qty += Number(r["Qty ASN"]||0);
        fact += Number(r["Факт"]||0);

        trucks.add(r["Машина"]);
        asnSet.add(r["ASNNumber"]);
    });

    const percent =
        qty===0 ? 0 :
        ((fact/qty)*100).toFixed(1);

    document.getElementById("kpiContainer").innerHTML =
    `
        <div class="kpi-card">
            <div class="kpi-title">Машин</div>
            <div class="kpi-value">${trucks.size}</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">ASN</div>
            <div class="kpi-value">${asnSet.size}</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">Qty ASN</div>
            <div class="kpi-value">${qty.toLocaleString()}</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">Принято</div>
            <div class="kpi-value">${fact.toLocaleString()}</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">Выполнение</div>
            <div class="kpi-value">${percent}%</div>
        </div>
    `;
}

/* =====================================================
   ЦВЕТ ASN
===================================================== */

function getStatusClass(fact,qty){

    if(fact <= 0)
        return "asn-not-started";

    if(fact >= qty)
        return "asn-complete";

    return "asn-progress";
}

/* =====================================================
   DASHBOARD
===================================================== */

function renderDashboard(structure){

    const dashboard =
        document.getElementById("dashboard");

    dashboard.innerHTML = "";

    const trucks =
        Object.keys(structure)
        .sort((a,b)=>String(b).localeCompare(String(a)));

    trucks.forEach(truck=>{

        const truckCard =
            document.createElement("div");

        truckCard.className =
            "truck-card";

        truckCard.innerHTML =
            `<div class="truck-title">${truck}</div>`;

        const row =
            document.createElement("div");

        row.className =
            "pallet-row";

        truckCard.appendChild(row);

        const pallets =
            Object.keys(
                structure[truck].pallets
            )
            .sort((a,b)=>Number(a)-Number(b));

        pallets.forEach(pallet=>{

            const palletDiv =
                document.createElement("div");

            palletDiv.className =
                "pallet";

            const column =
                document.createElement("div");

            column.className =
                "asn-column";

            const asns =
                structure[truck]
                .pallets[pallet];

            Object.keys(asns)
            .sort()
            .forEach(asn=>{

                const item =
                    asns[asn];

                const progress =
                    item.qtyASN===0
                    ? 0
                    : Math.round(
                        item.fact /
                        item.qtyASN *
                        100
                    );

                const box =
                    document.createElement("div");

                box.className =
                    `asn-box
                    ${getStatusClass(
                        item.fact,
                        item.qtyASN
                    )}
                    ${item.priority ? 'priority':''}`;

                box.innerHTML =
                    `
                    <span>${asn}</span>
                    <span class="progress-value">
                        ${progress}%
                    </span>
                    `;

                box.addEventListener(
                    "mousemove",
                    e=>{
                        showTooltip(
                            e,
                            asn,
                            item
                        );
                    }
                );

                box.addEventListener(
                    "mouseleave",
                    hideTooltip
                );

                column.appendChild(box);

            });

            palletDiv.appendChild(column);

            palletDiv.innerHTML +=
                `<div class="pallet-number">
                    Паллета ${pallet}
                </div>`;

            row.appendChild(palletDiv);

        });

        dashboard.appendChild(truckCard);

    });
}

/* =====================================================
   TOOLTIP
===================================================== */

const tooltip =
document.getElementById("tooltip");

function showTooltip(event,asn,item){

    tooltip.style.display =
        "block";

    tooltip.style.left =
        event.clientX + 15 + "px";

    tooltip.style.top =
        event.clientY + 15 + "px";

    tooltip.innerHTML =
    `
        <b>${asn}</b><br>
        Qty ASN: ${item.qtyASN}<br>
        Факт: ${item.fact}<br>
        Выполнение:
        ${Math.round(item.fact/item.qtyASN*100 || 0)}%
    `;
}

function hideTooltip(){

    tooltip.style.display =
        "none";
}

/* =====================================================
   ИНИЦИАЛИЗАЦИЯ
===================================================== */

async function init(){

    const rows =
        await loadCSV();

    buildKPI(rows);

    const structure =
        buildStructure(rows);

    renderDashboard(structure);
}

init();

</script>

</body>
</html>
