<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASN 08.07.2026 0-01 </title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

h1{
    margin-bottom:20px;
    color:#2c3e50;
}

.kpi-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.kpi{
    background:#fff;
    border-radius:12px;
    padding:18px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.kpi-title{
    color:#7f8c8d;
    font-size:14px;
}

.kpi-value{
    margin-top:10px;
    font-size:28px;
    font-weight:700;
    color:#2c3e50;
}

.legend{
    margin-bottom:20px;
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.legend-item{
    display:inline-flex;
    align-items:center;
    margin-right:20px;
}

.legend-color{
    width:18px;
    height:18px;
    margin-right:6px;
    border-radius:4px;
}

.charts{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:30px;
}

.chart-card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.machine-card{
    background:white;
    border-radius:16px;
    padding:18px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.machine-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.machine-name{
    font-size:24px;
    font-weight:700;
}

.machine-progress-wrapper{
    width:300px;
}

.machine-progress-bar{
    height:18px;
    background:#e0e0e0;
    border-radius:20px;
    overflow:hidden;
}

.machine-progress-fill{
    height:100%;
    background:#27ae60;
}

.machine-label{
    margin-bottom:4px;
    text-align:right;
    font-size:13px;
}

.pallet{
    border:1px solid #e5e5e5;
    border-radius:10px;
    padding:12px;
    margin-bottom:12px;
}

.pallet-title{
    font-weight:700;
    margin-bottom:10px;
}

.asn-grid{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.asn-card{
    width:220px;
    border-radius:12px;
    padding:10px;
    transition:.2s;
}

.asn-complete{
    background:#2ecc71;
    color:white;
}

.asn-progress{
    background:#f1c40f;
    color:#222;
}

.asn-notstarted{
    background:white;
    border:1px solid #dcdcdc;
}

.priority{
    border:3px solid red !important;
}

.asn-title{
    font-weight:700;
    margin-bottom:6px;
}

.asn-percent{
    font-size:22px;
    font-weight:700;
}

.asn-qty{
    margin-top:4px;
    font-size:13px;
}

.products{
    margin-top:10px;
    max-height:90px;
    overflow-y:auto;
    font-size:12px;
    line-height:1.5;
}

@media(max-width:1200px){
    .charts{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<h1>📦 Dashboard приемки ASN</h1>

<div id="kpis" class="kpi-container"></div>

<div class="legend">
    <div class="legend-item">
        <div class="legend-color" style="background:#2ecc71"></div>
        Полностью принято
    </div>

    <div class="legend-item">
        <div class="legend-color" style="background:#f1c40f"></div>
        В процессе
    </div>

    <div class="legend-item">
        <div class="legend-color" style="background:white;border:1px solid #999"></div>
        Не начато
    </div>

    <div class="legend-item">
        <div class="legend-color" style="border:3px solid red"></div>
        Приоритет
    </div>
</div>

<div class="charts">

    <div class="chart-card">
        <canvas id="statusChart"></canvas>
    </div>

    <div class="chart-card">
        <canvas id="machineChart"></canvas>
    </div>

</div>

<div id="machines"></div>

<script>

function parseCSV(text){

    const lines = text
        .replace(/\r/g,'')
        .split('\n')
        .filter(x=>x.trim()!=='');

    const headers = splitCSVLine(lines[0]);

    const result = [];

    for(let i=1;i<lines.length;i++){

        const values = splitCSVLine(lines[i]);

        const row = {};

        headers.forEach((h,index)=>{
            row[h.trim()] = (values[index] || "").trim();
        });

        result.push(row);
    }

    return result;
}

function splitCSVLine(line){

    const result = [];
    let current = "";
    let insideQuotes = false;

    for(let i=0;i<line.length;i++){

        const ch = line[i];

        if(ch === '"'){
            insideQuotes = !insideQuotes;
            continue;
        }

        if(ch === ';' && !insideQuotes){
            result.push(current);
            current = "";
            continue;
        }

        current += ch;
    }

    result.push(current);

    return result;
}

function num(v){
    return Number(
        String(v || 0)
        .replace(/\s/g,'')
        .replace(',', '.')
    ) || 0;
}

async function loadCSV(){

    const response = await fetch("asn.csv");

    const text = await response.text();

    const rows = parseCSV(text);

    buildDashboard(rows);
}

function buildDashboard(rows){

    const machines = {};

    let totalASN = 0;
    let totalFact = 0;

    rows.forEach(row=>{

        const machine = row["Машина"];
        const pallet = row["Паллет №"];
        const asn = row["ASNNumber"];

        const qty = num(row["Qty ASN"]);
        const fact = num(row["Факт"]);

        totalASN += qty;
        totalFact += fact;

        if(!machines[machine]){
            machines[machine] = {
                qty:0,
                fact:0,
                pallets:{}
            };
        }

        if(!machines[machine].pallets[pallet]){
            machines[machine].pallets[pallet] = {};
        }

        if(!machines[machine].pallets[pallet][asn]){

            machines[machine].pallets[pallet][asn] = {
                qty:0,
                fact:0,
                products:[],
                priority:row["Приоритет"]
            };
        }

        const asnObj = machines[machine].pallets[pallet][asn];

        asnObj.qty += qty;
        asnObj.fact += fact;

        asnObj.products.push(row["Номенклатура"]);

        machines[machine].qty += qty;
        machines[machine].fact += fact;
    });

    renderKPI(rows,machines,totalASN,totalFact);
    renderCharts(machines);
    renderMachines(machines);
}

function renderKPI(rows,machines,totalASN,totalFact){

    const asnCount =
        new Set(rows.map(x=>x.ASNNumber)).size;

    const totalProgress =
        totalASN
        ? ((totalFact/totalASN)*100).toFixed(1)
        : 0;

    document.getElementById('kpis').innerHTML = `

    <div class="kpi">
        <div class="kpi-title">Машин</div>
        <div class="kpi-value">${Object.keys(machines).length}</div>
    </div>

    <div class="kpi">
        <div class="kpi-title">ASN</div>
        <div class="kpi-value">${asnCount}</div>
    </div>

    <div class="kpi">
        <div class="kpi-title">Принято</div>
        <div class="kpi-value">${totalFact.toLocaleString()}</div>
    </div>

    <div class="kpi">
        <div class="kpi-title">Общий прогресс</div>
        <div class="kpi-value">${totalProgress}%</div>
    </div>

    `;
}

function renderCharts(machines){

    let complete=0;
    let progress=0;
    let notStarted=0;

    const machineLabels=[];
    const machineValues=[];

    Object.entries(machines).forEach(([machine,m])=>{

        const mp =
            m.qty
            ? ((m.fact/m.qty)*100)
            : 0;

        machineLabels.push(machine);
        machineValues.push(mp);

        Object.values(m.pallets).forEach(p=>{

            Object.values(p).forEach(asn=>{

                const p =
                    asn.qty
                    ? asn.fact/asn.qty
                    : 0;

                if(p === 0){
                    notStarted++;
                }
                else if(p >= 1){
                    complete++;
                }
                else{
                    progress++;
                }
            });
        });
    });

    new Chart(document.getElementById('statusChart'),{
        type:'doughnut',
        data:{
            labels:[
                'Завершено',
                'В процессе',
                'Не начато'
            ],
            datasets:[{
                data:[
                    complete,
                    progress,
                    notStarted
                ],
                backgroundColor:[
                    '#2ecc71',
                    '#f1c40f',
                    '#ecf0f1'
                ]
            }]
        }
    });

    new Chart(document.getElementById('machineChart'),{
        type:'bar',
        data:{
            labels:machineLabels,
            datasets:[{
                label:'% приемки',
                data:machineValues,
                backgroundColor:'#3498db'
            }]
        },
        options:{
            scales:{
                y:{
                    beginAtZero:true,
                    max:100
                }
            }
        }
    });
}

function renderMachines(machines){

    const container =
        document.getElementById('machines');

    let html = '';

    const sortedMachines =
        Object.keys(machines)
        .sort((a,b)=>Number(b)-Number(a));

    sortedMachines.forEach(machine=>{

        const m = machines[machine];

        const percent =
            m.qty
            ? ((m.fact/m.qty)*100).toFixed(0)
            : 0;

        html += `
            <div class="machine-card">

                <div class="machine-header">

                    <div class="machine-name">
                        🚚 Машина ${machine}
                    </div>

                    <div class="machine-progress-wrapper">

                        <div class="machine-label">
                            ${percent}% (${m.fact}/${m.qty})
                        </div>

                        <div class="machine-progress-bar">
                            <div class="machine-progress-fill"
                                 style="width:${percent}%"></div>
                        </div>

                    </div>

                </div>
        `;

        Object.keys(m.pallets).forEach(pallet=>{

            html += `
                <div class="pallet">

                    <div class="pallet-title">
                        📦 Паллета ${pallet}
                    </div>

                    <div class="asn-grid">
            `;

            Object.entries(m.pallets[pallet])
            .forEach(([asn,data])=>{

                const progress =
                    data.qty
                    ? data.fact/data.qty
                    : 0;

                let cls = "asn-notstarted";

                if(progress >= 1){
                    cls = "asn-complete";
                }
                else if(progress > 0){
                    cls = "asn-progress";
                }

                const priority =
                    data.priority &&
                    data.priority !== "0"
                    ? "priority" : "";

                html += `
                    <div class="asn-card ${cls} ${priority}">

                        <div class="asn-title">
                            ASN ${asn}
                        </div>

                        <div class="asn-percent">
                            ${(progress*100).toFixed(0)}%
                        </div>

                        <div class="asn-qty">
                            ${data.fact} / ${data.qty}
                        </div>

                        <div class="products">
                            ${data.products.map(
                                x=>`• ${x}`
                            ).join("<br>")}
                        </div>

                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;
        });

        html += `</div>`;
    });

    container.innerHTML = html;
}

loadCSV();

</script>

</body>
</html>
