<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASN 07.07.2026 23-29 </title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
        background: #f4f6f9;
        padding: 20px;
        color: #2c3e50;
    }

    h1 {
        margin-bottom: 20px;
    }

    .summary {
        display: grid;
        grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
        gap: 15px;
        margin-bottom: 20px;
    }

    .card {
        background: white;
        border-radius: 12px;
        padding: 18px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card .value {
        font-size: 30px;
        font-weight: bold;
        margin-top: 8px;
    }

    .charts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
    }

    .chart-container {
        background: white;
        border-radius: 12px;
        padding: 15px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .truck {
        background: white;
        border-radius: 14px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        overflow: hidden;
    }

    .truck-header {
        background: #1f4e79;
        color: white;
        padding: 15px 20px;
        font-size: 20px;
        font-weight: bold;
    }

    .pallet {
        margin: 15px;
        border: 1px solid #dfe6ec;
        border-radius: 10px;
        overflow: hidden;
    }

    .pallet-header {
        background: #edf3f9;
        padding: 12px 15px;
        font-weight: bold;
    }

    .asn {
        padding: 14px;
        border-top: 1px solid #eef2f5;
    }

    .asn.priority {
        background: #fff2f2;
        border-left: 6px solid #e53935;
    }

    .asn-title {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 8px;
    }

    .progress {
        width: 100%;
        height: 24px;
        background: #e9eef3;
        border-radius: 30px;
        overflow: hidden;
    }

    .progress-bar {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 12px;
        font-weight: bold;
        transition: 0.3s;
    }

    .green {
        background: linear-gradient(90deg,#2ecc71,#27ae60);
    }

    .orange {
        background: linear-gradient(90deg,#f39c12,#e67e22);
    }

    .red {
        background: linear-gradient(90deg,#e74c3c,#c0392b);
    }

    .priority-badge {
        background: #e53935;
        color: white;
        padding: 4px 8px;
        border-radius: 20px;
        font-size: 12px;
    }

    .details {
        margin-top: 8px;
        color: #555;
        font-size: 13px;
    }

    @media(max-width:1000px){
        .charts{
            grid-template-columns:1fr;
        }
    }
</style>
</head>

<body>

<h1>🚚 Дашборд приемки ASN</h1>

<div class="summary">
    <div class="card">
        <div>Машин на приемке</div>
        <div class="value" id="truckCount">0</div>
    </div>

    <div class="card">
        <div>Паллет</div>
        <div class="value" id="palletCount">0</div>
    </div>

    <div class="card">
        <div>ASN</div>
        <div class="value" id="asnCount">0</div>
    </div>

    <div class="card">
        <div>Общий % приемки</div>
        <div class="value" id="overallAcceptance">0%</div>
    </div>
</div>

<div class="charts">
    <div class="chart-container">
        <canvas id="truckChart"></canvas>
    </div>

    <div class="chart-container">
        <canvas id="priorityChart"></canvas>
    </div>
</div>

<div id="dashboard"></div>


<script>

let truckChart = null;
let priorityChart = null;

fetch('./asn.csv')
.then(response => response.text())
.then(csv => {

    Papa.parse(csv, {
        header: true,
        skipEmptyLines: true,
        complete: function(result) {
            buildDashboard(result.data);
        }
    });

})
.catch(error => {
    document.body.innerHTML += `
        <div style="color:red;padding:20px">
            Не удалось загрузить файл asn.csv<br>
            ${error}
        </div>
    `;
});

function buildDashboard(rows) {

    const trucks = {};
    const asnMap = {};

    let totalASNQty = 0;
    let totalFactQty = 0;

    rows.forEach(row => {

        const truck = row["Машина"] || "Без машины";
        const pallet = row["Паллет №"] || "Без паллеты";
        const asn = row["ASNNumber"] || "Без ASN";

        const qty = Number(row["Qty ASN"] || 0);
        const fact = Number(row["Факт"] || 0);

        totalASNQty += qty;
        totalFactQty += fact;

        if (!trucks[truck]) {
            trucks[truck] = {};
        }

        if (!trucks[truck][pallet]) {
            trucks[truck][pallet] = {};
        }

        if (!trucks[truck][pallet][asn]) {
            trucks[truck][pallet][asn] = {
                qty: 0,
                fact: 0,
                priority: false,
                items: 0
            };
        }

        const priorityValue = String(row["Приоритет"] || "").toLowerCase();

        trucks[truck][pallet][asn].qty += qty;
        trucks[truck][pallet][asn].fact += fact;
        trucks[truck][pallet][asn].items++;

        if (
            priorityValue === "да" ||
            priorityValue === "1" ||
            priorityValue === "true" ||
            priorityValue === "yes"
        ) {
            trucks[truck][pallet][asn].priority = true;
        }

        asnMap[asn] = true;
    });

    document.getElementById("truckCount").textContent =
        Object.keys(trucks).length;

    document.getElementById("asnCount").textContent =
        Object.keys(asnMap).length;

    document.getElementById("overallAcceptance").textContent =
        totalASNQty > 0
        ? Math.round((totalFactQty / totalASNQty) * 100) + "%"
        : "0%";

    let palletCounter = 0;

    Object.values(trucks).forEach(pallets => {
        palletCounter += Object.keys(pallets).length;
    });

    document.getElementById("palletCount").textContent = palletCounter;

    drawTruckChart(trucks);
    drawPriorityChart(trucks);

    const container = document.getElementById("dashboard");
    container.innerHTML = "";

    Object.entries(trucks).forEach(([truckName, pallets]) => {

        let truckHtml = `
            <div class="truck">
                <div class="truck-header">🚚 ${truckName}</div>
        `;

        Object.entries(pallets).forEach(([palletName, asns]) => {

            truckHtml += `
                <div class="pallet">
                    <div class="pallet-header">
                        📦 Паллет: ${palletName}
                    </div>
            `;

            Object.entries(asns).forEach(([asnNumber, asnData]) => {

                const percent =
                    asnData.qty > 0
                    ? Math.min(100, Math.round((asnData.fact / asnData.qty) * 100))
                    : 0;

                let colorClass = "red";

                if (percent >= 90) {
                    colorClass = "green";
                }
                else if (percent >= 50) {
                    colorClass = "orange";
                }

                truckHtml += `
                    <div class="asn ${asnData.priority ? 'priority' : ''}">

                        <div class="asn-title">

                            <div>
                                <strong>ASN:</strong> ${asnNumber}
                            </div>

                            ${asnData.priority
                                ? '<span class="priority-badge">ПРИОРИТЕТ</span>'
                                : ''
                            }

                        </div>

                        <div class="progress">
                            <div class="progress-bar ${colorClass}"
                                 style="width:${percent}%">
                                ${percent}%
                            </div>
                        </div>

                        <div class="details">
                            Qty ASN: ${asnData.qty.toLocaleString()} |
                            Факт: ${asnData.fact.toLocaleString()}
                        </div>

                    </div>
                `;

            });

            truckHtml += `</div>`;
        });

        truckHtml += `</div>`;

        container.insertAdjacentHTML("beforeend", truckHtml);

    });

}

function drawTruckChart(trucks) {

    const labels = [];
    const values = [];

    Object.entries(trucks).forEach(([truck, pallets]) => {

        let qty = 0;
        let fact = 0;

        Object.values(pallets).forEach(asns => {

            Object.values(asns).forEach(item => {
                qty += item.qty;
                fact += item.fact;
            });

        });

        labels.push(truck);

        values.push(
            qty > 0
            ? Math.round((fact / qty) * 100)
            : 0
        );
    });

    if (truckChart) {
        truckChart.destroy();
    }

    truckChart = new Chart(
        document.getElementById("truckChart"),
        {
            type: "bar",
            data: {
                labels,
                datasets: [{
                    label: "% приемки по машинам",
                    data: values
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        }
    );
}

function drawPriorityChart(trucks) {

    let priority = 0;
    let usual = 0;

    Object.values(trucks).forEach(pallets => {

        Object.values(pallets).forEach(asns => {

            Object.values(asns).forEach(item => {

                if (item.priority) {
                    priority++;
                } else {
                    usual++;
                }

            });

        });

    });

    if (priorityChart) {
        priorityChart.destroy();
    }

    priorityChart = new Chart(
        document.getElementById("priorityChart"),
        {
            type: "doughnut",
            data: {
                labels: ["Приоритетные ASN", "Обычные ASN"],
                datasets: [{
                    data: [priority, usual],
                    backgroundColor: [
                        "#e53935",
                        "#4caf50"
                    ]
                }]
            }
        }
    );
}

</script>

</body>
</html>
