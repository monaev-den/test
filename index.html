<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASN 07.07.2026 23-55 </title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
    color:#2c3e50;
}

h1{
    margin-bottom:20px;
}

.summary{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:18px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card .value{
    font-size:30px;
    font-weight:bold;
    margin-top:8px;
}

.charts{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

.chart-container{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.heatmap-container{
    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.heatmap-header{
    font-size:20px;
    font-weight:bold;
    margin-bottom:15px;
}

.heatmap-header-row{
    display:grid;
    grid-template-columns:220px 180px 120px 140px;
    gap:10px;
    font-weight:bold;
    border-bottom:2px solid #ddd;
    padding-bottom:10px;
    margin-bottom:10px;
}

.heatmap-row{
    display:grid;
    grid-template-columns:220px 180px 120px 140px;
    gap:10px;
    align-items:center;
    padding:10px;
    margin-bottom:4px;
    border-radius:8px;
}

.heatmap-red{
    background:#ffdddd;
}

.heatmap-orange{
    background:#ffe8c9;
}

.heatmap-yellow{
    background:#fff7cc;
}

.heatmap-green{
    background:#dff5df;
}

.heatmap-priority{
    border-left:6px solid #e53935;
    font-weight:bold;
}

.truck{
    background:white;
    border-radius:14px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    overflow:hidden;
}

.truck-header{
    background:#1f4e79;
    color:white;
    padding:15px 20px;
    font-size:20px;
    font-weight:bold;
}

.pallet{
    margin:15px;
    border:1px solid #dfe6ec;
    border-radius:10px;
    overflow:hidden;
}

.pallet-header{
    background:#edf3f9;
    padding:12px 15px;
    font-weight:bold;
}

.asn{
    padding:14px;
    border-top:1px solid #eef2f5;
}

.asn.priority{
    background:#fff2f2;
    border-left:6px solid #e53935;
}

.asn-title{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:8px;
}

.priority-badge{
    background:#e53935;
    color:#fff;
    padding:4px 8px;
    border-radius:20px;
    font-size:12px;
}

.progress{
    width:100%;
    height:24px;
    background:#e9eef3;
    border-radius:30px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
    font-size:12px;
}

.green{
    background:linear-gradient(90deg,#2ecc71,#27ae60);
}

.orange{
    background:linear-gradient(90deg,#f39c12,#e67e22);
}

.red{
    background:linear-gradient(90deg,#e74c3c,#c0392b);
}

.details{
    margin-top:8px;
    color:#555;
    font-size:13px;
}

@media(max-width:1000px){

    .charts{
        grid-template-columns:1fr;
    }

    .heatmap-header-row,
    .heatmap-row{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<h1>🚚 Дашборд приемки ASN</h1>

<div class="summary">

    <div class="card">
        <div>Машин на приемке</div>
        <div class="value" id="truckCount">0</div>
    </div>

    <div class="card">
        <div>Паллет</div>
        <div class="value" id="palletCount">0</div>
    </div>

    <div class="card">
        <div>ASN</div>
        <div class="value" id="asnCount">0</div>
    </div>

    <div class="card">
        <div>Общий % приемки</div>
        <div class="value" id="overallAcceptance">0%</div>
    </div>

</div>

<div class="charts">

    <div class="chart-container">
        <canvas id="truckChart"></canvas>
    </div>

    <div class="chart-container">
        <canvas id="priorityChart"></canvas>
    </div>

</div>

<div class="heatmap-container">

    <div class="heatmap-header">
        🔥 Критичные ASN
    </div>

    <div id="heatmap"></div>

</div>

<div id="dashboard"></div>

<script>

let truckChart=null;
let priorityChart=null;

function parseCSV(text){

    const lines=text.trim().split(/\r?\n/);

    if(lines.length<2){
        return [];
    }

    const separator=
        (lines[0].match(/;/g)||[]).length>
        (lines[0].match(/,/g)||[]).length
        ? ";"
        : ",";

    const headers=lines[0]
        .split(separator)
        .map(h=>h.trim().replace(/^"|"$/g,""));

    const result=[];

    for(let i=1;i<lines.length;i++){

        const values=lines[i]
            .split(separator)
            .map(v=>v.trim().replace(/^"|"$/g,""));

        let row={};

        headers.forEach((header,index)=>{
            row[header]=values[index]||"";
        });

        result.push(row);
    }

    return result;
}

fetch("./asn.csv")
.then(r=>r.text())
.then(csv=>{

    const data=parseCSV(csv);

    buildDashboard(data);

})
.catch(error=>{

    document.body.innerHTML += `
        <div style="padding:20px;color:red;">
            Не удалось загрузить файл asn.csv<br>
            ${error}
        </div>
    `;

});

function buildDashboard(rows){

    const trucks={};
    const asnMap={};

    const heatmapData=[];

    let totalQty=0;
    let totalFact=0;

    rows.forEach(row=>{

        const truck=row["Машина"] || "Без машины";
        const pallet=row["Паллет №"] || "Без паллеты";
        const asn=row["ASNNumber"] || "Без ASN";

        const qty=parseFloat(
            String(row["Qty ASN"]||0)
            .replace(/\s/g,"")
            .replace(",",".")
        ) || 0;

        const fact=parseFloat(
            String(row["Факт"]||0)
            .replace(/\s/g,"")
            .replace(",",".")
        ) || 0;

        totalQty+=qty;
        totalFact+=fact;

        if(!trucks[truck]) trucks[truck]={};
        if(!trucks[truck][pallet]) trucks[truck][pallet]={};

        if(!trucks[truck][pallet][asn]){

            trucks[truck][pallet][asn]={
                qty:0,
                fact:0,
                priority:false
            };
        }

        let priorityFlag=String(row["Приоритет"] || "")
        .trim()
        .toLowerCase();

        trucks[truck][pallet][asn].qty+=qty;
        trucks[truck][pallet][asn].fact+=fact;

        if(
            priorityFlag==="да" ||
            priorityFlag==="1" ||
            priorityFlag==="x" ||
            priorityFlag==="true" ||
            priorityFlag==="yes"
        ){
            trucks[truck][pallet][asn].priority=true;
        }

        asnMap[asn]=true;

    });

    document.getElementById("truckCount").textContent=
        Object.keys(trucks).length;

    document.getElementById("asnCount").textContent=
        Object.keys(asnMap).length;

    document.getElementById("overallAcceptance").textContent=
        totalQty>0
        ? Math.round((totalFact/totalQty)*100)+"%"
        : "0%";

    let palletCount=0;

    Object.values(trucks).forEach(p=>{
        palletCount+=Object.keys(p).length;
    });

    document.getElementById("palletCount").textContent=palletCount;

    const dashboard=document.getElementById("dashboard");
    dashboard.innerHTML="";

    Object.entries(trucks).forEach(([truckName,pallets])=>{

        let html=`
            <div class="truck">
                <div class="truck-header">
                    🚚 ${truckName}
                </div>
        `;

        Object.entries(pallets).forEach(([palletName,asns])=>{

            html+=`
            <div class="pallet">
                <div class="pallet-header">
                    📦 Паллет: ${palletName}
                </div>
            `;

            Object.entries(asns).forEach(([asn,data])=>{

                const percent=
                    data.qty>0
                    ? Math.min(100,Math.round(data.fact/data.qty*100))
                    : 0;

                heatmapData.push({
                    asn:asn,
                    truck:truckName,
                    percent:percent,
                    priority:data.priority
                });

                let colorClass="red";

                if(percent>=90){
                    colorClass="green";
                }else if(percent>=50){
                    colorClass="orange";
                }

                html+=`
                <div class="asn ${data.priority ? 'priority':''}">

                    <div class="asn-title">

                        <div>
                            <strong>ASN:</strong> ${asn}
                        </div>

                        ${data.priority
                            ? '<span class="priority-badge">ПРИОРИТЕТ</span>'
                            : ''
                        }

                    </div>

                    <div class="progress">
                        <div class="progress-bar ${colorClass}"
                             style="width:${percent}%;">
                            ${percent}%
                        </div>
                    </div>

                    <div class="details">
                        Qty ASN: ${data.qty.toLocaleString()}
                        |
                        Факт: ${data.fact.toLocaleString()}
                    </div>

                </div>
                `;

            });

            html+=`</div>`;

        });

        html+=`</div>`;

        dashboard.insertAdjacentHTML("beforeend",html);

    });

    drawTruckChart(trucks);
    drawPriorityChart(trucks);
    renderHeatmap(heatmapData);

}

function renderHeatmap(data){

    const container=document.getElementById("heatmap");

    data.sort((a,b)=>{

        if(a.priority && !b.priority) return -1;
        if(!a.priority && b.priority) return 1;

        return a.percent-b.percent;

    });

    let html=`
    <div class="heatmap-header-row">
        <div>ASN</div>
        <div>Машина</div>
        <div>Приемка</div>
        <div>Статус</div>
    </div>
    `;

    data.forEach(item=>{

        let cls="heatmap-green";
        let status="Завершено";

        if(item.percent<30){
            cls="heatmap-red";
            status="Критично";
        }
        else if(item.percent<70){
            cls="heatmap-orange";
            status="В работе";
        }
        else if(item.percent<100){
            cls="heatmap-yellow";
            status="Почти готово";
        }

        html+=`
        <div class="heatmap-row ${cls} ${item.priority ? 'heatmap-priority':''}">
            <div>${item.asn}</div>
            <div>${item.truck}</div>
            <div>${item.percent}%</div>
            <div>${status}</div>
        </div>
        `;
    });

    container.innerHTML=html;
}

function drawTruckChart(trucks){

    const labels=[];
    const values=[];

    Object.entries(trucks).forEach(([truck,pallets])=>{

        let qty=0;
        let fact=0;

        Object.values(pallets).forEach(asns=>{

            Object.values(asns).forEach(item=>{

                qty+=item.qty;
                fact+=item.fact;

            });

        });

        labels.push(truck);

        values.push(
            qty>0
            ? Math.round(fact/qty*100)
            : 0
        );

    });

    if(truckChart) truckChart.destroy();

    truckChart=new Chart(
        document.getElementById("truckChart"),
        {
            type:"bar",
            data:{
                labels:labels,
                datasets:[{
                    label:"% приемки по машинам",
                    data:values
                }]
            },
            options:{
                responsive:true,
                scales:{
                    y:{
                        beginAtZero:true,
                        max:100
                    }
                }
            }
        }
    );
}

function drawPriorityChart(trucks){

    let priority=0;
    let normal=0;

    Object.values(trucks).forEach(pallets=>{

        Object.values(pallets).forEach(asns=>{

            Object.values(asns).forEach(item=>{

                if(item.priority){
                    priority++;
                }else{
                    normal++;
                }

            });

        });

    });

    if(priorityChart) priorityChart.destroy();

    priorityChart=new Chart(
        document.getElementById("priorityChart"),
        {
            type:"doughnut",
            data:{
                labels:[
                    "Приоритетные ASN",
                    "Обычные ASN"
                ],
                datasets:[{
                    data:[priority,normal],
                    backgroundColor:[
                        "#e53935",
                        "#4caf50"
                    ]
                }]
            }
        }
    );
}

</script>

</body>
</html>
